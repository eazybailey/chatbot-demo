<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
  <link rel="apple-touch-icon" href="/images/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#121212">
  <title>Dialogue Coach — Practice Better Conversations</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #1a1a2e; color: #f0f0f0; height: 100vh; overflow: hidden; }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.06); }
    }
    @keyframes ripple {
      0% { transform: scale(1); opacity: 0.5; }
      100% { transform: scale(2.8); opacity: 0; }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes dotPulse {
      0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1); }
    }
    @keyframes waveBar {
      0%, 100% { height: 8px; }
      50% { height: 24px; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">

    const SYSTEM_PROMPT = `You are the Dialogue Coach — a warm, knowledgeable, and encouraging conversation coach and practice buddy. You embody the teachings of "The Dialogue System," a comprehensive interpersonal communication framework developed from many years of research by Professor Gerard Egan and Andrew Bailey.

YOUR CORE IDENTITY:
You are like a skilled communication mentor who has deeply internalized the Dialogue System. You help people understand and practice the art of effective two-way communication — dialogue — which is the Number 1 Skill of life. You believe that even small improvements in communication style can make a big difference to someone's relationships and quality of life.

THE DIALOGUE SYSTEM — YOUR SOURCE OF TRUTH:

1. TRUE DIALOGUE has four characteristics:
   - Turn-taking: Both people share the airtime
   - Connecting: What each person says connects with what the other said
   - Mutual influence: Give-and-take, open to being influenced
   - Co-creating: Together creating something new — the outcome emerges with uncertainty

2. THREE ROLES we switch between in every conversation:
   - EXPLAINER: When you have something to share (story, message, point of view, or case). Goal: be understood.
   - UNDERSTANDER: When your job is to understand the other person. Active, not passive.
   - CONVERSATION MANAGER: Looking after the well-being of the conversation itself.

3. EXPLAINER SKILLS:
   - Engage attention — don't assume the other person is tuned in
   - Headline and underline — name your topic clearly upfront
   - Provide context — set the scene with background
   - Fill in the picture using the right framework:
     * SAME for stories (Situation, Actions, Mental states, Experiences)
     * MRI for messages (Message, Reasons, Implications)
     * PRE for points of view (Point, Reasons, Evidence/Examples)
     * CRITIC for making a case (Case/Credibility, Reasons, Interests of stakeholders, Time to digest, your Interests, Compromise)
   - Bring things to life — be concrete and specific, use examples
   - Personalise appropriately — share yourself to build relationships
   - Welcome questions — treat them as opportunities, not interruptions
   - Check for understanding — provide summaries, look for clues

4. UNDERSTANDER SKILLS:
   - Visibly tune in — body language must show you are present
   - Listen actively with an open mind — avoid judgmental, filtered, stereotype-based, resistive, or interpretive listening
   - Identify highlights — the main points the Explainer is trying to get across
   - Feed back highlights — share your understanding in your own words (most important and underused skill)
   - Work to get the full picture — encourage flow, probe for clarity with open questions
   - Respond constructively — avoid instant advice, being judgmental, dismissing concerns, or hijacking
   - Summarise for mutual understanding

5. CONVERSATION MANAGER SKILLS:
   - Prepare for important conversations (purpose, main points, right frame of mind)
   - Share and negotiate purpose — avoid talking at cross-purposes
   - Manage flow and turn-taking — invite others in
   - Build on mutual respect — straight-across, not up-down conversations
   - Honour conversational rights — respect timing, boundaries, and the right to decline
   - Make emotions serve conversations — monitor emotional temperature, respond rather than react, count to ten
   - Read social undercurrents — use social intelligence, competence, and courage
   - Collaborate don't compete — aim for win-win, not win-lose
   - Repair conversations when your behavior is at fault — catch mistakes and fix them
   - Coach others to play better — help less-skilled partners engage in dialogue

6. THE SLIPPERY SLOPE (how misunderstandings escalate):
   Experience an incident → Give it your own spin → Make assumptions → Draw unwarranted conclusions → Act on the mess you've created

7. KEY PRINCIPLES:
   - Misunderstanding is the norm, not the exception
   - Take personal responsibility for the quality of your conversations
   - "Boredom is a self-indictment" — say "I'm letting myself be bored" not "I'm bored"
   - You always have a choice in how you respond
   - Better communication is for a better life

HOW YOU INTERACT:

Mode 1 — TEACHING: When the user wants to learn about communication concepts, explain them warmly using vivid examples from everyday life (like the book does). Reference the specific frameworks (SAME, MRI, PRE, CRITIC) and the three roles naturally.

Mode 2 — COACHING: When the user describes a real conversation challenge, help them analyze it through the lens of the three roles and relevant skills. Ask which role they were in. Help them see what went well and what could improve. Be specific and actionable.

Mode 3 — PRACTICE: When the user wants to practice, role-play conversations with them. You can play the "other person" in a scenario they describe. Afterward, give constructive feedback on their Explainer, Understander, or Conversation Manager skills. Suggest specific improvements.

Mode 4 — REFLECTION: Help users discover their own communication style — their "theme and variations." Ask about patterns across different relationships and settings. Help them identify strengths and growth areas.

VOICE & STYLE GUIDELINES:
- Keep responses conversational and concise — 2 to 4 sentences max since they will be spoken aloud.
- Be warm, encouraging, and practical — like a wise friend, not a lecturer.
- Use natural spoken language. Avoid bullet points, markdown, asterisks, or long paragraphs.
- Reference the system's concepts naturally (e.g., "That sounds like you were in the Understander role" or "A headline might help here").
- Ask one thoughtful follow-up question to keep the conversation going.
- When giving feedback, balance what went well with what could improve.
- Use the Dialogue System's own principles in YOUR conversation — model good dialogue by feeding back highlights, checking understanding, and showing genuine interest.
- Never be preachy or condescending. The book itself says "you don't always have to be nice" — be real and direct when needed, but always respectful.`;

    const GREETING = "Welcome! I'm your Dialogue Coach — here to help you become a more effective communicator. I'm based on a powerful system that breaks great conversations down into learnable skills across three roles: the Explainer, the Understander, and the Conversation Manager. We can explore the ideas, work through a real conversation challenge you're facing, or even practice a tricky conversation together. What would be most useful for you right now?";

    // ── Hooks ──

    const useSpeechRecognition = () => {
      const recognitionRef = React.useRef(null);
      const [supported, setSupported] = React.useState(true);

      React.useEffect(() => {
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SR) { setSupported(false); return; }
        const r = new SR();
        r.continuous = false;
        r.interimResults = true;
        r.lang = 'en-US';
        recognitionRef.current = r;
        return () => { try { r.abort(); } catch(e) {} };
      }, []);

      const start = (onInterim, onFinal, onError) => {
        const r = recognitionRef.current;
        if (!r) return;
        r.onresult = (e) => {
          let interim = '', final = '';
          for (let i = e.resultIndex; i < e.results.length; i++) {
            const t = e.results[i][0].transcript;
            if (e.results[i].isFinal) final += t;
            else interim += t;
          }
          if (interim) onInterim(interim);
          if (final) onFinal(final);
        };
        r.onerror = (e) => {
          if (e.error === 'no-speech' || e.error === 'aborted') return;
          onError(e.error);
        };
        r.onend = () => {}; // handled via onFinal
        try { r.start(); } catch(e) {}
      };

      const stop = () => {
        try { recognitionRef.current?.stop(); } catch(e) {}
      };

      return { start, stop, supported };
    };

    const useSpeechSynthesis = () => {
      const [voices, setVoices] = React.useState([]);
      const utterRef = React.useRef(null);

      React.useEffect(() => {
        const load = () => setVoices(speechSynthesis.getVoices());
        speechSynthesis.addEventListener('voiceschanged', load);
        load();
        return () => speechSynthesis.removeEventListener('voiceschanged', load);
      }, []);

      const pickVoice = () => {
        const prefs = ['Google US English', 'Samantha', 'Karen', 'Microsoft Zira', 'English United States'];
        for (const p of prefs) {
          const v = voices.find(v => v.name.includes(p));
          if (v) return v;
        }
        return voices.find(v => v.lang.startsWith('en')) || null;
      };

      const speak = (text) => {
        return new Promise((resolve) => {
          speechSynthesis.cancel();
          // Chunk long text at sentence boundaries to avoid Chrome 15s bug
          const sentences = text.match(/[^.!?]+[.!?]+[\s]*/g) || [text];
          let i = 0;
          const next = () => {
            if (i >= sentences.length) { resolve(); return; }
            const u = new SpeechSynthesisUtterance(sentences[i].trim());
            u.rate = 0.95;
            u.pitch = 1.0;
            const v = pickVoice();
            if (v) u.voice = v;
            u.onend = () => { i++; next(); };
            u.onerror = () => { i++; next(); };
            utterRef.current = u;
            speechSynthesis.speak(u);
          };
          next();
        });
      };

      const cancel = () => {
        speechSynthesis.cancel();
      };

      return { speak, cancel };
    };

    // ── Components ──

    const MessageBubble = ({ role, content }) => {
      const isUser = role === 'user';
      return React.createElement('div', {
        style: {
          display: 'flex',
          justifyContent: isUser ? 'flex-end' : 'flex-start',
          marginBottom: 12,
          animation: 'fadeInUp 0.3s ease-out',
        }
      },
        React.createElement('div', {
          style: {
            maxWidth: '80%',
            padding: '12px 18px',
            borderRadius: isUser ? '18px 18px 4px 18px' : '18px 18px 18px 4px',
            background: isUser ? '#ffd21f' : '#2a2a4a',
            color: isUser ? '#1a1a2e' : '#f0f0f0',
            fontSize: 15,
            lineHeight: 1.5,
            boxShadow: '0 2px 8px rgba(0,0,0,0.15)',
          }
        }, content)
      );
    };

    const TypingIndicator = () => {
      return React.createElement('div', {
        style: { display: 'flex', justifyContent: 'flex-start', marginBottom: 12 }
      },
        React.createElement('div', {
          style: {
            padding: '14px 22px',
            borderRadius: '18px 18px 18px 4px',
            background: '#2a2a4a',
            display: 'flex',
            gap: 6,
            alignItems: 'center',
          }
        },
          ...[0, 1, 2].map(i =>
            React.createElement('div', {
              key: i,
              style: {
                width: 8, height: 8, borderRadius: '50%', background: '#ffd21f',
                animation: `dotPulse 1.4s ease-in-out ${i * 0.2}s infinite`,
              }
            })
          )
        )
      );
    };

    const WaveVisualizer = () => {
      return React.createElement('div', {
        style: { display: 'flex', gap: 3, alignItems: 'center', justifyContent: 'center', height: 32 }
      },
        ...[0,1,2,3,4,5,6].map(i =>
          React.createElement('div', {
            key: i,
            style: {
              width: 4,
              background: '#ffd21f',
              borderRadius: 2,
              animation: `waveBar 0.8s ease-in-out ${i * 0.1}s infinite`,
            }
          })
        )
      );
    };

    const MicButton = ({ state, onClick }) => {
      const isListening = state === 'listening';
      const isIdle = state === 'idle';
      const color = isListening ? '#e74c3c' : '#ffd21f';

      return React.createElement('div', {
        style: { position: 'relative', display: 'flex', alignItems: 'center', justifyContent: 'center' }
      },
        // Ripple rings when listening
        isListening && [0,1,2].map(i =>
          React.createElement('div', {
            key: `ripple-${i}`,
            style: {
              position: 'absolute',
              width: 80, height: 80, borderRadius: '50%',
              border: `2px solid ${color}`,
              animation: `ripple 1.8s ease-out ${i * 0.5}s infinite`,
              pointerEvents: 'none',
            }
          })
        ),
        React.createElement('button', {
          onClick,
          style: {
            width: 80, height: 80, borderRadius: '50%',
            background: color,
            border: 'none',
            cursor: 'pointer',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            boxShadow: `0 0 ${isListening ? 30 : 15}px ${color}60`,
            animation: isIdle ? 'pulse 2.5s ease-in-out infinite' : 'none',
            transition: 'background 0.3s, box-shadow 0.3s',
          }
        },
          // Mic SVG icon
          React.createElement('svg', {
            width: 32, height: 32, viewBox: '0 0 24 24',
            fill: isListening ? '#fff' : '#1a1a2e',
          },
            state === 'speaking'
              ? // Speaker icon
                React.createElement('path', { d: 'M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z' })
              : // Mic icon
                React.createElement('path', { d: 'M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z' })
          )
        )
      );
    };

    // ── Main App ──

    const VoiceApp = () => {
      const [messages, setMessages] = React.useState([
        { role: 'assistant', content: GREETING }
      ]);
      const [voiceState, setVoiceState] = React.useState('idle'); // idle | listening | processing | speaking
      const [interimText, setInterimText] = React.useState('');
      const [textInput, setTextInput] = React.useState('');
      const [error, setError] = React.useState(null);
      const chatEndRef = React.useRef(null);
      const messagesRef = React.useRef(messages);
      const { start: startRec, stop: stopRec, supported: sttSupported } = useSpeechRecognition();
      const { speak, cancel: cancelSpeak } = useSpeechSynthesis();

      // Keep ref in sync
      React.useEffect(() => { messagesRef.current = messages; }, [messages]);

      // Auto-scroll
      React.useEffect(() => {
        chatEndRef.current?.scrollIntoView({ behavior: 'smooth' });
      }, [messages, voiceState, interimText]);

      // Speak greeting on mount
      React.useEffect(() => {
        const timer = setTimeout(() => {
          setVoiceState('speaking');
          speak(GREETING).then(() => setVoiceState('idle'));
        }, 600);
        return () => clearTimeout(timer);
      }, []);

      const sendToClaude = async (userText) => {
        const updated = [...messagesRef.current, { role: 'user', content: userText }];
        setMessages(updated);
        setVoiceState('processing');
        setInterimText('');

        try {
          const response = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              system: SYSTEM_PROMPT,
              max_tokens: 500,
              messages: updated.map(m => ({ role: m.role, content: m.content })),
            }),
          });

          const data = await response.json();
          if (data.error) throw new Error(data.error.message || 'API error');

          const assistantText = data.content
            .filter(item => item.type === 'text')
            .map(item => item.text)
            .join(' ');

          const withReply = [...updated, { role: 'assistant', content: assistantText }];
          setMessages(withReply);

          setVoiceState('speaking');
          await speak(assistantText);
          setVoiceState('idle');
        } catch (err) {
          console.error('Error:', err);
          setError('Something went wrong. Please try again.');
          setVoiceState('idle');
          setTimeout(() => setError(null), 4000);
        }
      };

      const handleMicClick = () => {
        if (voiceState === 'speaking') {
          cancelSpeak();
          setVoiceState('idle');
          return;
        }
        if (voiceState === 'processing') return;

        if (voiceState === 'listening') {
          stopRec();
          // If we have interim text, treat it as final
          if (interimText.trim()) {
            sendToClaude(interimText.trim());
          } else {
            setVoiceState('idle');
          }
          return;
        }

        // Start listening
        setVoiceState('listening');
        setInterimText('');
        setError(null);

        startRec(
          (interim) => setInterimText(interim),
          (final) => {
            setInterimText('');
            stopRec();
            if (final.trim()) sendToClaude(final.trim());
            else setVoiceState('idle');
          },
          (err) => {
            setError(err === 'not-allowed' ? 'Microphone access denied. Please allow mic access and try again.' : `Speech error: ${err}`);
            setVoiceState('idle');
            setTimeout(() => setError(null), 4000);
          }
        );
      };

      const handleTextSubmit = (e) => {
        e.preventDefault();
        if (!textInput.trim() || voiceState === 'processing' || voiceState === 'speaking') return;
        cancelSpeak();
        sendToClaude(textInput.trim());
        setTextInput('');
      };

      const statusText = {
        idle: sttSupported ? 'Tap to speak' : 'Type your message below',
        listening: 'Listening...',
        processing: 'Thinking...',
        speaking: 'Speaking... tap to stop',
      };

      return React.createElement('div', {
        style: {
          display: 'flex', flexDirection: 'column', height: '100vh', maxWidth: 600,
          margin: '0 auto', position: 'relative',
        }
      },
        // Header
        React.createElement('div', {
          style: {
            padding: '16px 20px',
            display: 'flex', alignItems: 'center', justifyContent: 'space-between',
            borderBottom: '1px solid #2a2a4a',
            flexShrink: 0,
          }
        },
          React.createElement('div', { style: { display: 'flex', alignItems: 'center', gap: 12 } },
            React.createElement('div', {
              style: { width: 36, height: 36, borderRadius: '50%', background: '#ffd21f',
                display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 18 }
            }, React.createElement('svg', { width: 20, height: 20, viewBox: '0 0 24 24', fill: '#1a1a2e' },
              React.createElement('path', { d: 'M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z' })
            )),
            React.createElement('div', {},
              React.createElement('div', { style: { fontWeight: 600, fontSize: 16 } }, 'Dialogue Coach'),
              React.createElement('div', { style: { fontSize: 12, color: '#999', marginTop: 2 } }, 'Your conversation practice buddy'),
            ),
          ),
          React.createElement('a', {
            href: 'index.html',
            style: { color: '#ffd21f', textDecoration: 'none', fontSize: 13 }
          }, 'Home')
        ),

        // Chat area
        React.createElement('div', {
          style: {
            flex: 1, overflowY: 'auto', padding: '20px 16px',
            display: 'flex', flexDirection: 'column',
          }
        },
          messages.map((m, i) =>
            React.createElement(MessageBubble, { key: i, role: m.role, content: m.content })
          ),
          voiceState === 'processing' && React.createElement(TypingIndicator, {}),
          // Interim transcript preview
          interimText && React.createElement('div', {
            style: {
              display: 'flex', justifyContent: 'flex-end', marginBottom: 12,
              animation: 'fadeInUp 0.2s ease-out',
            }
          },
            React.createElement('div', {
              style: {
                maxWidth: '80%', padding: '12px 18px',
                borderRadius: '18px 18px 4px 18px',
                background: 'rgba(255,210,31,0.3)', color: '#ffd21f',
                fontSize: 15, lineHeight: 1.5, fontStyle: 'italic',
                border: '1px dashed rgba(255,210,31,0.4)',
              }
            }, interimText)
          ),
          React.createElement('div', { ref: chatEndRef })
        ),

        // Error banner
        error && React.createElement('div', {
          style: {
            padding: '10px 16px', background: '#e74c3c22', color: '#e74c3c',
            textAlign: 'center', fontSize: 13, borderTop: '1px solid #e74c3c44',
          }
        }, error),

        // Bottom controls
        React.createElement('div', {
          style: {
            padding: '16px 20px 24px', display: 'flex', flexDirection: 'column',
            alignItems: 'center', gap: 14, borderTop: '1px solid #2a2a4a',
            background: '#1a1a2e', flexShrink: 0,
          }
        },
          // Status
          React.createElement('div', {
            style: { fontSize: 13, color: '#999', letterSpacing: 0.5 }
          }, statusText[voiceState]),

          // Wave visualizer when listening
          voiceState === 'listening' && React.createElement(WaveVisualizer, {}),

          // Mic button
          React.createElement(MicButton, { state: voiceState, onClick: handleMicClick }),

          // Text input fallback
          React.createElement('form', {
            onSubmit: handleTextSubmit,
            style: { display: 'flex', gap: 8, width: '100%', maxWidth: 400 }
          },
            React.createElement('input', {
              type: 'text',
              value: textInput,
              onChange: (e) => setTextInput(e.target.value),
              placeholder: 'Or type a message...',
              disabled: voiceState === 'processing' || voiceState === 'speaking',
              style: {
                flex: 1, padding: '10px 16px', borderRadius: 24,
                border: '1px solid #2a2a4a', background: '#16213e', color: '#f0f0f0',
                fontSize: 14, outline: 'none',
              }
            }),
            React.createElement('button', {
              type: 'submit',
              disabled: !textInput.trim() || voiceState === 'processing' || voiceState === 'speaking',
              style: {
                padding: '10px 18px', borderRadius: 24, border: 'none',
                background: textInput.trim() ? '#ffd21f' : '#2a2a4a',
                color: textInput.trim() ? '#1a1a2e' : '#666',
                fontWeight: 600, cursor: textInput.trim() ? 'pointer' : 'default',
                fontSize: 14, transition: 'background 0.2s',
              }
            }, 'Send')
          ),

          // Browser warning
          !sttSupported && React.createElement('div', {
            style: {
              fontSize: 12, color: '#e74c3c', textAlign: 'center', padding: '4px 12px',
              background: '#e74c3c15', borderRadius: 8,
            }
          }, 'Voice input not supported in this browser. Please use Chrome or Edge for the full voice experience, or type below.')
        )
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(VoiceApp));
  </script>
</body>
</html>
