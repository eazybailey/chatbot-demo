<!DOCTYPE html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">

  <title>Feel Understood — Your Conversation Coach</title>
  <link rel="stylesheet" href="styles.css">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<body>
  <div id="root"></div>
  <script type="text/babel">

    // ── Profile-based System Prompt Builder ──
    const buildSystemPrompt = (profile) => {
      const base = `You are the coach behind "Feel Understood" — a warm, knowledgeable, and encouraging conversation coach and practice buddy. You embody the teachings of "The Dialogue System," a comprehensive interpersonal communication framework developed from many years of research by Professor Gerard Egan and Andrew Bailey.

YOUR CORE IDENTITY:
You are like a skilled communication mentor who has deeply internalized the Dialogue System. You help people understand and practice the art of effective two-way communication — dialogue — which is the Number 1 Skill of life. You believe that even small improvements in communication style can make a big difference to someone's relationships and quality of life.

THE DIALOGUE SYSTEM — YOUR SOURCE OF TRUTH:

1. TRUE DIALOGUE has four characteristics:
   - Turn-taking: Both people share the airtime
   - Connecting: What each person says connects with what the other said
   - Mutual influence: Give-and-take, open to being influenced
   - Co-creating: Together creating something new — the outcome emerges with uncertainty

2. THREE ROLES we switch between in every conversation:
   - EXPLAINER: When you have something to share (story, message, point of view, or case). Goal: be understood.
   - UNDERSTANDER: When your job is to understand the other person. Active, not passive.
   - CONVERSATION MANAGER: Looking after the well-being of the conversation itself.

3. EXPLAINER SKILLS:
   - Engage attention — don't assume the other person is tuned in
   - Headline and underline — name your topic clearly upfront
   - Provide context — set the scene with background
   - Fill in the picture using the right framework:
     * SAME for stories (Situation, Actions, Mental states, Experiences)
     * MRI for messages (Message, Reasons, Implications)
     * PRE for points of view (Point, Reasons, Evidence/Examples)
     * CRITIC for making a case (Case/Credibility, Reasons, Interests of stakeholders, Time to digest, your Interests, Compromise)
   - Bring things to life — be concrete and specific, use examples
   - Personalise appropriately — share yourself to build relationships
   - Welcome questions — treat them as opportunities, not interruptions
   - Check for understanding — provide summaries, look for clues

4. UNDERSTANDER SKILLS:
   - Visibly tune in — body language must show you are present
   - Listen actively with an open mind — avoid judgmental, filtered, stereotype-based, resistive, or interpretive listening
   - Identify highlights — the main points the Explainer is trying to get across
   - Feed back highlights — share your understanding in your own words (most important and underused skill)
   - Work to get the full picture — encourage flow, probe for clarity with open questions
   - Respond constructively — avoid instant advice, being judgmental, dismissing concerns, or hijacking
   - Summarise for mutual understanding

5. CONVERSATION MANAGER SKILLS:
   - Prepare for important conversations (purpose, main points, right frame of mind)
   - Share and negotiate purpose — avoid talking at cross-purposes
   - Manage flow and turn-taking — invite others in
   - Build on mutual respect — straight-across, not up-down conversations
   - Honour conversational rights — respect timing, boundaries, and the right to decline
   - Make emotions serve conversations — monitor emotional temperature, respond rather than react, count to ten
   - Read social undercurrents — use social intelligence, competence, and courage
   - Collaborate don't compete — aim for win-win, not win-lose
   - Repair conversations when your behavior is at fault — catch mistakes and fix them
   - Coach others to play better — help less-skilled partners engage in dialogue

6. THE SLIPPERY SLOPE (how misunderstandings escalate):
   Experience an incident → Give it your own spin → Make assumptions → Draw unwarranted conclusions → Act on the mess you've created

7. KEY PRINCIPLES:
   - Misunderstanding is the norm, not the exception
   - Take personal responsibility for the quality of your conversations
   - "Boredom is a self-indictment" — say "I'm letting myself be bored" not "I'm bored"
   - You always have a choice in how you respond
   - Better communication is for a better life

HOW YOU INTERACT:

Mode 1 — TEACHING: When the user wants to learn about communication concepts, explain them warmly using vivid examples from everyday life (like the book does). Reference the specific frameworks (SAME, MRI, PRE, CRITIC) and the three roles naturally.

Mode 2 — COACHING: When the user describes a real conversation challenge, help them analyze it through the lens of the three roles and relevant skills. Ask which role they were in. Help them see what went well and what could improve. Be specific and actionable.

Mode 3 — PRACTICE: When the user wants to practice, role-play conversations with them. You can play the "other person" in a scenario they describe. Afterward, give constructive feedback on their Explainer, Understander, or Conversation Manager skills. Suggest specific improvements.

Mode 4 — REFLECTION: Help users discover their own communication style — their "theme and variations." Ask about patterns across different relationships and settings. Help them identify strengths and growth areas.

VOICE & STYLE GUIDELINES:
- Keep responses conversational and concise — 2 to 4 sentences max since they will be spoken aloud.
- Be warm, encouraging, and practical — like a wise friend, not a lecturer.
- Use natural spoken language. Avoid bullet points, markdown, asterisks, or long paragraphs.
- Reference the system's concepts naturally (e.g., "That sounds like you were in the Understander role" or "A headline might help here").
- Ask one thoughtful follow-up question to keep the conversation going.
- When giving feedback, balance what went well with what could improve.
- Use the Dialogue System's own principles in YOUR conversation — model good dialogue by feeding back highlights, checking understanding, and showing genuine interest.
- Never be preachy or condescending. The book itself says "you don't always have to be nice" — be real and direct when needed, but always respectful.`;

      if (!profile) return base;

      const modeMap = {
        learn: 'learning communication skills and frameworks',
        coach: 'getting help with a specific real conversation',
        practice: 'practicing difficult conversations through role-play',
        reflect: 'understanding their own communication style',
      };

      const explainerMap = {
        improv: 'They tend to jump into explanations without a clear structure — they could benefit from learning to headline and provide context first.',
        structured: 'They naturally headline and structure their explanations well — this is a strength to build on.',
        context: 'They tend to over-explain with too much context — they could benefit from learning to headline first and be more concise.',
        brief: 'They tend to under-explain and skip context — they could benefit from learning to fill in the picture more using frameworks like SAME or MRI.',
      };

      const understanderMap = {
        fix: 'Their instinct is to offer solutions immediately — a common pattern. Help them practice feeding back highlights and resisting the urge to fix.',
        curious: 'They naturally ask questions to understand — a strong Understander trait. Help them also practice feeding back highlights in their own words.',
        relate: 'They connect by sharing similar experiences — this builds rapport but can accidentally hijack. Help them balance sharing with focused listening.',
        listen: 'They default to quiet listening — good patience, but they may appear passive. Help them practice active skills like feeding back highlights.',
      };

      const conflictMap = {
        push: 'Under tension they push harder — a compete pattern. Help them practice getting curious about the other side and finding win-win outcomes.',
        avoid: 'Under tension they back off — an avoidance pattern. Help them build confidence to stay in difficult conversations while managing emotions.',
        compromise: 'Under tension they seek middle ground — a good instinct. Help them go deeper by understanding both sides fully before compromising.',
        collaborate: 'Under tension they get curious — an excellent Conversation Manager instinct. Help them build on this strength.',
      };

      const challengeMap = {
        heard: 'Their biggest struggle is being heard and understood — focus on Explainer skills like engaging attention, headlining, and checking for understanding.',
        listening: 'Their biggest struggle is truly listening — focus on Understander skills, especially feeding back highlights and listening with an open mind.',
        emotions: 'Their biggest struggle is navigating emotions — focus on Conversation Manager skills like monitoring emotional temperature and responding rather than reacting.',
        starting: 'Their biggest struggle is starting and sustaining conversations — focus on preparation, sharing purpose, and building confidence through practice.',
      };

      const profileContext = `

USER PROFILE — PERSONALISE YOUR COACHING:
- Name: ${profile.name}
- Primary interest: ${modeMap[profile.goal] || 'general communication improvement'}
- Explaining style: ${explainerMap[profile.explainer] || ''}
- Listening style: ${understanderMap[profile.understander] || ''}
- Conflict approach: ${conflictMap[profile.conflict] || ''}
- Key challenge: ${challengeMap[profile.challenge] || ''}

IMPORTANT: Address the user by their name naturally (not every message, but occasionally). Tailor your coaching to their profile — lean into their strengths, gently work on their growth areas. Start with their primary interest but be flexible. Reference their specific patterns when relevant (e.g., "I know you mentioned navigating tense conversations is tough for you — let's work on that").`;

      return base + profileContext;
    };

    const buildGreeting = (profile) => {
      if (!profile) return "Hey! Welcome to Feel Understood. I'm your Conversation Coach. Want to learn a communication skill, get help with a tricky conversation, or jump into a role-play? What's on your mind?";

      const goalGreetings = {
        learn: `Hey ${profile.name}! Great to meet you. You said you're keen to learn new communication skills — I love that. The Dialogue System is packed with practical stuff. Want to start with the three roles we all play in every conversation, or is there a specific skill you're curious about?`,
        coach: `Hey ${profile.name}! Good to have you here. You mentioned you've got a specific conversation you'd like help with — I'm all ears. Tell me what's going on and we'll work through it together.`,
        practice: `Hey ${profile.name}! Welcome — you're here to practice, and that's the best way to get better. Think of a conversation you've got coming up or one that didn't go well, and we can role-play it. What scenario would be most useful for you?`,
        reflect: `Hey ${profile.name}! I'm glad you want to explore your communication style — self-awareness is where it all starts. Let me ask you this: think about your last few important conversations. Do you notice any patterns in how they went?`,
      };

      return goalGreetings[profile.goal] || `Hey ${profile.name}! Great to meet you. Welcome to Feel Understood — I'm your Conversation Coach, here to help you have better conversations. What would you like to work on?`;
    };

    // ── Quiz Data ──
    const QUIZ_SCREENS = [
      {
        id: 'welcome',
        type: 'splash',
      },
      {
        id: 'name',
        type: 'name-input',
        title: 'What should we call you?',
        subtitle: 'Your coach will use your name to personalise the experience.',
      },
      {
        id: 'goal',
        type: 'choice',
        title: 'What would help you most right now?',
        subtitle: 'This helps your coach know where to start.',
        options: [
          { value: 'learn', label: 'Learn new skills', desc: 'Discover frameworks that make every conversation better' },
          { value: 'coach', label: 'Get help with a conversation', desc: "Work through something that's on your mind" },
          { value: 'practice', label: 'Practice a tricky conversation', desc: 'Role-play with your coach and get feedback' },
          { value: 'reflect', label: 'Understand my style', desc: 'Discover patterns in how you communicate' },
        ],
      },
      {
        id: 'explainer',
        type: 'choice',
        title: 'When you need to explain something important, you usually...',
        subtitle: 'Everyone has a natural explaining style. There are no wrong answers.',
        insight: 'The Dialogue System identifies the Explainer as one of three roles we play in every conversation.',
        options: [
          { value: 'improv', label: 'Jump right in and figure it out as I talk' },
          { value: 'structured', label: 'Lead with the headline, then fill in details' },
          { value: 'context', label: 'Set the scene with lots of background first' },
          { value: 'brief', label: 'Keep it short — less is more' },
        ],
      },
      {
        id: 'understander',
        type: 'choice',
        title: 'Someone tells you about a tough situation. Your first instinct?',
        subtitle: 'How we respond when others share matters more than we think.',
        insight: 'The Understander role is about truly getting the other person — not just hearing them.',
        options: [
          { value: 'fix', label: 'Offer advice or a solution' },
          { value: 'curious', label: 'Ask questions to understand more' },
          { value: 'relate', label: 'Share a similar experience of my own' },
          { value: 'listen', label: 'Just listen and let them talk' },
        ],
      },
      {
        id: 'conflict',
        type: 'choice',
        title: 'When a conversation gets tense, you tend to...',
        subtitle: 'Tension is where conversations are won or lost.',
        insight: 'The Conversation Manager looks after the health of the conversation itself.',
        options: [
          { value: 'push', label: 'Push my point harder' },
          { value: 'avoid', label: 'Back off to keep the peace' },
          { value: 'compromise', label: 'Find the middle ground' },
          { value: 'collaborate', label: 'Get curious about their side' },
        ],
      },
      {
        id: 'challenge',
        type: 'choice',
        title: "What's hardest for you in conversations?",
        subtitle: 'Knowing your challenge is the first step to growth.',
        options: [
          { value: 'heard', label: 'Being heard and understood' },
          { value: 'listening', label: 'Truly listening without jumping ahead' },
          { value: 'emotions', label: 'Navigating emotions and tension' },
          { value: 'starting', label: 'Starting or keeping conversations going' },
        ],
      },
      {
        id: 'profile',
        type: 'profile-reveal',
      },
    ];

    // ── Profile Analysis ──
    const analyzeProfile = (answers) => {
      const strengthMap = {
        structured: { label: 'Clear Communicator', desc: 'You naturally structure your thoughts before sharing — a key Explainer skill that many people struggle with.' },
        curious: { label: 'Natural Questioner', desc: 'You instinctively ask questions to understand — the foundation of being a great Understander.' },
        collaborate: { label: 'Collaborative Navigator', desc: 'When things get tense, you lean in with curiosity — a hallmark of skilled Conversation Managers.' },
        compromise: { label: 'Bridge Builder', desc: 'You instinctively look for common ground — a valuable skill for keeping conversations productive.' },
        listen: { label: 'Patient Listener', desc: 'You give people space to express themselves — a gift in a world where everyone wants to talk.' },
        relate: { label: 'Empathic Connector', desc: "You build bridges by sharing your own experiences — this creates rapport and trust." },
        context: { label: 'Thorough Explainer', desc: 'You make sure people have the full picture — attention to context is a real strength.' },
        brief: { label: 'Concise Communicator', desc: 'You get to the point efficiently — people appreciate clarity and brevity.' },
        improv: { label: 'Spontaneous Communicator', desc: 'You think on your feet and speak naturally — this brings energy and authenticity to conversations.' },
        fix: { label: 'Problem Solver', desc: 'You jump to help with solutions — people know they can count on you to take action.' },
        push: { label: 'Assertive Communicator', desc: "You stand your ground under pressure — knowing what you want is a foundation to build on." },
        avoid: { label: 'Harmony Keeper', desc: 'You value peace in relationships — this sensitivity to others is a real asset when channelled well.' },
      };

      const growthMap = {
        heard: { label: 'Being Understood', desc: 'We\'ll work on Explainer skills — like engaging attention, headlining your message, and checking that your point landed.' },
        listening: { label: 'Deep Listening', desc: "We'll practice Understander skills — especially feeding back what you've heard in your own words. It's the most powerful and underused skill." },
        emotions: { label: 'Emotional Navigation', desc: "We'll build Conversation Manager skills — like reading the emotional temperature and responding rather than reacting." },
        starting: { label: 'Conversation Confidence', desc: "We'll work on preparation and flow — learning to share purpose, manage turn-taking, and keep conversations alive." },
      };

      // Pick strength from explainer or understander answer (whichever is more distinctive)
      const strengthKey = answers.understander || answers.explainer || 'curious';
      const strength = strengthMap[strengthKey] || strengthMap.curious;
      const growth = growthMap[answers.challenge] || growthMap.heard;

      return { strength, growth };
    };

    // ── ProfileQuiz Component ──
    const ProfileQuiz = ({ onComplete }) => {
      const [step, setStep] = React.useState(0);
      const [answers, setAnswers] = React.useState({});
      const [name, setName] = React.useState('');
      const [animDir, setAnimDir] = React.useState('forward');
      const [animating, setAnimating] = React.useState(false);
      const nameInputRef = React.useRef(null);

      const screen = QUIZ_SCREENS[step];
      const totalSteps = QUIZ_SCREENS.length;
      const progress = step / (totalSteps - 1);

      React.useEffect(() => {
        if (screen.type === 'name-input' && nameInputRef.current) {
          setTimeout(() => nameInputRef.current?.focus(), 400);
        }
      }, [step]);

      const goNext = () => {
        if (animating) return;
        setAnimDir('forward');
        setAnimating(true);
        setTimeout(() => {
          setStep(s => s + 1);
          setAnimating(false);
        }, 300);
      };

      const goBack = () => {
        if (animating || step === 0) return;
        setAnimDir('back');
        setAnimating(true);
        setTimeout(() => {
          setStep(s => s - 1);
          setAnimating(false);
        }, 300);
      };

      const selectOption = (questionId, value) => {
        setAnswers(a => ({ ...a, [questionId]: value }));
        // Auto-advance after a brief pause
        setTimeout(() => goNext(), 350);
      };

      const handleNameSubmit = (e) => {
        e.preventDefault();
        if (name.trim()) goNext();
      };

      const handleFinish = () => {
        const profile = { name: name.trim(), ...answers };
        onComplete(profile);
      };

      const analysis = analyzeProfile(answers);

      // ── Render current screen ──
      const renderScreen = () => {
        const animClass = animating
          ? (animDir === 'forward' ? 'quiz-exit' : 'quiz-exit-back')
          : (animDir === 'forward' ? 'quiz-enter' : 'quiz-enter-back');

        if (screen.type === 'splash') {
          return React.createElement('div', { className: `quiz-screen quiz-splash ${animClass}`, key: step },
            React.createElement('div', { className: 'quiz-splash-content' },
              React.createElement('div', { className: 'quiz-splash-icon' },
                React.createElement('img', { src: '/images/logo.svg', alt: 'Feel Understood', height: 56 })
              ),
              React.createElement('h1', { className: 'quiz-splash-title' }, 'Your conversations shape your life'),
              React.createElement('p', { className: 'quiz-splash-desc' },
                'In just a minute, discover your communication style and meet your personal AI coach.'
              ),
              React.createElement('div', { className: 'quiz-splash-features' },
                React.createElement('div', { className: 'quiz-splash-feat' },
                  React.createElement('span', { className: 'quiz-feat-dot' }),
                  'Based on 30+ years of communication research'
                ),
                React.createElement('div', { className: 'quiz-splash-feat' },
                  React.createElement('span', { className: 'quiz-feat-dot' }),
                  'Personalised to how you actually communicate'
                ),
                React.createElement('div', { className: 'quiz-splash-feat' },
                  React.createElement('span', { className: 'quiz-feat-dot' }),
                  'Practice with a coach that adapts to you'
                ),
              ),
              React.createElement('button', { className: 'quiz-cta', onClick: goNext }, "Let's Go"),
            )
          );
        }

        if (screen.type === 'name-input') {
          return React.createElement('div', { className: `quiz-screen quiz-name ${animClass}`, key: step },
            React.createElement('h2', { className: 'quiz-title' }, screen.title),
            React.createElement('p', { className: 'quiz-subtitle' }, screen.subtitle),
            React.createElement('form', { className: 'quiz-name-form', onSubmit: handleNameSubmit },
              React.createElement('input', {
                ref: nameInputRef,
                type: 'text',
                className: 'quiz-name-input',
                value: name,
                onChange: (e) => setName(e.target.value),
                placeholder: 'Your first name',
                maxLength: 30,
                autoComplete: 'given-name',
              }),
              React.createElement('button', {
                type: 'submit',
                className: `quiz-cta ${name.trim() ? '' : 'quiz-cta-disabled'}`,
                disabled: !name.trim(),
              }, 'Continue'),
            )
          );
        }

        if (screen.type === 'choice') {
          return React.createElement('div', { className: `quiz-screen quiz-choice ${animClass}`, key: step },
            React.createElement('h2', { className: 'quiz-title' }, screen.title),
            React.createElement('p', { className: 'quiz-subtitle' }, screen.subtitle),
            React.createElement('div', { className: 'quiz-options' },
              screen.options.map((opt) =>
                React.createElement('button', {
                  key: opt.value,
                  className: `quiz-option ${answers[screen.id] === opt.value ? 'quiz-option-selected' : ''}`,
                  onClick: () => selectOption(screen.id, opt.value),
                },
                  React.createElement('span', { className: 'quiz-option-label' }, opt.label),
                  opt.desc && React.createElement('span', { className: 'quiz-option-desc' }, opt.desc),
                )
              )
            ),
            screen.insight && React.createElement('p', { className: 'quiz-insight' }, screen.insight),
          );
        }

        if (screen.type === 'profile-reveal') {
          return React.createElement('div', { className: `quiz-screen quiz-reveal ${animClass}`, key: step },
            React.createElement('div', { className: 'quiz-reveal-header' },
              React.createElement('div', { className: 'quiz-reveal-avatar' }, name.trim().charAt(0).toUpperCase()),
              React.createElement('h2', { className: 'quiz-reveal-name' }, name.trim()),
              React.createElement('p', { className: 'quiz-reveal-tagline' }, 'Your Communication Profile'),
            ),
            React.createElement('div', { className: 'quiz-reveal-cards' },
              React.createElement('div', { className: 'quiz-reveal-card quiz-strength-card' },
                React.createElement('span', { className: 'quiz-card-badge quiz-badge-strength' }, 'Your Strength'),
                React.createElement('h3', null, analysis.strength.label),
                React.createElement('p', null, analysis.strength.desc),
              ),
              React.createElement('div', { className: 'quiz-reveal-card quiz-growth-card' },
                React.createElement('span', { className: 'quiz-card-badge quiz-badge-growth' }, 'Growth Area'),
                React.createElement('h3', null, analysis.growth.label),
                React.createElement('p', null, analysis.growth.desc),
              ),
            ),
            React.createElement('button', { className: 'quiz-cta quiz-cta-final', onClick: handleFinish }, 'Meet Your Coach'),
          );
        }

        return null;
      };

      return React.createElement('div', { className: 'quiz-container' },
        // Progress bar (hidden on splash)
        step > 0 && React.createElement('div', { className: 'quiz-progress-wrap' },
          step > 0 && React.createElement('button', {
            className: 'quiz-back-btn',
            onClick: goBack,
            'aria-label': 'Go back',
          },
            React.createElement('svg', { width: 20, height: 20, viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: 2.5, strokeLinecap: 'round', strokeLinejoin: 'round' },
              React.createElement('polyline', { points: '15 18 9 12 15 6' })
            )
          ),
          React.createElement('div', { className: 'quiz-progress-bar' },
            React.createElement('div', { className: 'quiz-progress-fill', style: { width: `${progress * 100}%` } })
          ),
        ),
        renderScreen(),
      );
    };

    // ── Speech Recognition Hook ──
    const useSpeechRecognition = () => {
      const recognitionRef = React.useRef(null);
      const [supported, setSupported] = React.useState(true);

      React.useEffect(() => {
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SR) { setSupported(false); return; }
        const r = new SR();
        r.continuous = false;
        r.interimResults = true;
        r.lang = 'en-US';
        recognitionRef.current = r;
        return () => { try { r.abort(); } catch(e) {} };
      }, []);

      const start = (onInterim, onFinal, onError) => {
        const r = recognitionRef.current;
        if (!r) return;
        r.onresult = (e) => {
          let interim = '', final = '';
          for (let i = e.resultIndex; i < e.results.length; i++) {
            const t = e.results[i][0].transcript;
            if (e.results[i].isFinal) final += t;
            else interim += t;
          }
          if (interim) onInterim(interim);
          if (final) onFinal(final);
        };
        r.onerror = (e) => {
          if (e.error === 'no-speech' || e.error === 'aborted') return;
          onError(e.error);
        };
        r.onend = () => {};
        try { r.start(); } catch(e) {}
      };

      const stop = () => {
        try { recognitionRef.current?.stop(); } catch(e) {}
      };

      return { start, stop, supported };
    };

    // ── TTS Audio Queue (OpenAI TTS via Nova) ──
    // Fetches TTS for a sentence and returns a playable blob URL
    const fetchTTS = async (text) => {
      const response = await fetch('/api/tts', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ input: text, voice: 'nova' }),
      });
      if (!response.ok) throw new Error('TTS failed');
      const blob = await response.blob();
      return URL.createObjectURL(blob);
    };

    // Plays a single audio URL, returns a promise
    const playAudioUrl = (url, audioRef) => {
      return new Promise((resolve) => {
        const audio = new Audio(url);
        audioRef.current = audio;
        audio.onended = () => { URL.revokeObjectURL(url); audioRef.current = null; resolve(); };
        audio.onerror = () => { URL.revokeObjectURL(url); audioRef.current = null; resolve(); };
        audio.play().catch(() => resolve());
      });
    };

    // Splits text into sentences for chunked TTS
    const splitSentences = (text) => {
      const parts = text.match(/[^.!?]+[.!?]+[\s]*/g);
      if (!parts) return [text];
      // Recombine very short fragments with previous sentence
      const result = [];
      for (const p of parts) {
        if (result.length > 0 && result[result.length - 1].length < 20) {
          result[result.length - 1] += p;
        } else {
          result.push(p);
        }
      }
      return result;
    };

    const useSpeechSynthesis = () => {
      const audioRef = React.useRef(null);
      const cancelledRef = React.useRef(false);

      const speak = async (text) => {
        cancelledRef.current = false;
        try {
          const sentences = splitSentences(text);
          // Fire all TTS requests in parallel immediately
          const ttsPromises = sentences.map(s => fetchTTS(s.trim()));
          // Play each in order as they resolve
          for (let i = 0; i < sentences.length; i++) {
            if (cancelledRef.current) return;
            const url = await ttsPromises[i];
            if (cancelledRef.current) { URL.revokeObjectURL(url); return; }
            await playAudioUrl(url, audioRef);
          }
        } catch (err) {
          console.error('TTS error:', err);
          if (!cancelledRef.current) {
            return new Promise((resolve) => {
              const u = new SpeechSynthesisUtterance(text);
              u.rate = 1.0;
              u.onend = resolve;
              u.onerror = resolve;
              speechSynthesis.speak(u);
            });
          }
        }
      };

      // Streaming speak: accepts sentences one at a time, overlaps fetch + playback
      const speakStreaming = () => {
        cancelledRef.current = false;
        const queue = []; // { promise: Promise<url>, index }
        let playIndex = 0;
        let playing = false;
        let resolveFinished;
        let doneAdding = false;
        const finished = new Promise(r => { resolveFinished = r; });

        const tryPlay = async () => {
          if (playing) return;
          playing = true;
          while (playIndex < queue.length) {
            if (cancelledRef.current) break;
            try {
              const url = await queue[playIndex];
              if (cancelledRef.current) { URL.revokeObjectURL(url); break; }
              await playAudioUrl(url, audioRef);
            } catch (e) { /* skip failed chunk */ }
            playIndex++;
          }
          playing = false;
          if (doneAdding && playIndex >= queue.length) resolveFinished();
        };

        const addSentence = (sentence) => {
          queue.push(fetchTTS(sentence.trim()));
          tryPlay();
        };

        const finish = () => {
          doneAdding = true;
          if (playIndex >= queue.length) resolveFinished();
          else tryPlay();
          return finished;
        };

        return { addSentence, finish };
      };

      const cancel = () => {
        cancelledRef.current = true;
        if (audioRef.current) {
          audioRef.current.pause();
          audioRef.current.currentTime = 0;
          audioRef.current = null;
        }
        speechSynthesis.cancel();
      };

      return { speak, speakStreaming, cancel };
    };

    // ── Typing Indicator ──
    const TypingIndicator = () => {
      return React.createElement('div', { className: 'msg-row assistant' },
        React.createElement('div', { className: 'avatar' },
              React.createElement('img', { src: '/images/icon-avatar.svg', alt: '', width: 20, height: 20, className: 'doodle-icon' })
            ),
        React.createElement('div', { className: 'bubble assistant-bubble typing-bubble' },
          ...[0, 1, 2].map(i =>
            React.createElement('div', {
              key: i,
              className: 'typing-dot',
              style: { animationDelay: `${i * 0.2}s` }
            })
          )
        )
      );
    };

    // ── Message Bubble ──
    const MessageBubble = ({ role, content }) => {
      const isUser = role === 'user';
      return React.createElement('div', { className: `msg-row ${role}` },
        !isUser && React.createElement('div', { className: 'avatar' },
              React.createElement('img', { src: '/images/icon-avatar.svg', alt: '', width: 20, height: 20, className: 'doodle-icon' })
            ),
        React.createElement('div', {
          className: `bubble ${isUser ? 'user-bubble' : 'assistant-bubble'}`
        }, content)
      );
    };

    // ── Wave Visualizer ──
    const WaveVisualizer = () => {
      return React.createElement('div', { className: 'wave-viz' },
        ...[0,1,2,3,4,5,6].map(i =>
          React.createElement('div', {
            key: i,
            className: 'wave-bar',
            style: { animationDelay: `${i * 0.1}s` }
          })
        )
      );
    };

    // ── Main App ──
    const App = () => {
      const [started, setStarted] = React.useState(false);
      const [profile, setProfile] = React.useState(null);
      const [messages, setMessages] = React.useState([]);
      const [voiceState, setVoiceState] = React.useState('idle');
      const [interimText, setInterimText] = React.useState('');
      const [textInput, setTextInput] = React.useState('');
      const [error, setError] = React.useState(null);
      const chatEndRef = React.useRef(null);
      const messagesRef = React.useRef(messages);
      const profileRef = React.useRef(null);
      const inputRef = React.useRef(null);
      const { start: startRec, stop: stopRec, supported: sttSupported } = useSpeechRecognition();
      const { speak, speakStreaming, cancel: cancelSpeak } = useSpeechSynthesis();

      React.useEffect(() => { messagesRef.current = messages; }, [messages]);
      React.useEffect(() => { profileRef.current = profile; }, [profile]);

      React.useEffect(() => {
        chatEndRef.current?.scrollIntoView({ behavior: 'smooth' });
      }, [messages, voiceState, interimText]);

      const handleQuizComplete = (quizProfile) => {
        setProfile(quizProfile);
        profileRef.current = quizProfile;
        const greeting = buildGreeting(quizProfile);
        setMessages([{ role: 'assistant', content: greeting }]);
        setStarted(true);
        setTimeout(() => {
          setVoiceState('speaking');
          speak(greeting).then(() => setVoiceState('idle'));
        }, 400);
      };

      const sendToClaude = async (userText) => {
        const updated = [...messagesRef.current, { role: 'user', content: userText }];
        setMessages(updated);
        setVoiceState('processing');
        setInterimText('');

        try {
          const response = await fetch('/api/chat-stream', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              system: buildSystemPrompt(profileRef.current),
              max_tokens: 500,
              messages: updated.map(m => ({ role: m.role, content: m.content })),
            }),
          });

          if (!response.ok) throw new Error('Stream request failed');

          const reader = response.body.getReader();
          const decoder = new TextDecoder();
          let fullText = '';
          let sentenceBuffer = '';
          let streamSpeaker = null;
          let startedSpeaking = false;

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            const chunk = decoder.decode(value, { stream: true });
            const lines = chunk.split('\n');

            for (const line of lines) {
              if (!line.startsWith('data: ')) continue;
              const data = line.slice(6).trim();
              if (data === '[DONE]') continue;

              try {
                const parsed = JSON.parse(data);
                if (parsed.text) {
                  fullText += parsed.text;
                  sentenceBuffer += parsed.text;

                  // Update message text as it streams in
                  setMessages([...updated, { role: 'assistant', content: fullText }]);

                  // Aggressively fire TTS on any natural break point
                  // Priority 1: sentence endings (.!?)
                  // Priority 2: clause breaks (,;:—–) if buffer > 40 chars
                  // Priority 3: any content if buffer > 80 chars (force split at word boundary)
                  let fireChunk = null;
                  const sentenceMatch = sentenceBuffer.match(/^([\s\S]*?[.!?])[\s]?/);
                  const clauseMatch = sentenceBuffer.length > 40 && sentenceBuffer.match(/^([\s\S]*?[,;:\u2014\u2013])[\s]?/);

                  if (sentenceMatch) {
                    fireChunk = sentenceMatch[1].trim();
                    sentenceBuffer = sentenceBuffer.slice(sentenceMatch[0].length);
                  } else if (clauseMatch) {
                    fireChunk = clauseMatch[1].trim();
                    sentenceBuffer = sentenceBuffer.slice(clauseMatch[0].length);
                  } else if (sentenceBuffer.length > 80) {
                    // Force split at last word boundary
                    const wordBreak = sentenceBuffer.lastIndexOf(' ', 80);
                    const splitAt = wordBreak > 20 ? wordBreak : 80;
                    fireChunk = sentenceBuffer.slice(0, splitAt).trim();
                    sentenceBuffer = sentenceBuffer.slice(splitAt);
                  }

                  if (fireChunk && fireChunk.length > 0) {
                    if (!streamSpeaker) {
                      streamSpeaker = speakStreaming();
                      setVoiceState('speaking');
                      startedSpeaking = true;
                    }
                    streamSpeaker.addSentence(fireChunk);
                  }
                }
              } catch (e) { /* skip */ }
            }
          }

          // Handle any remaining text that didn't end with punctuation
          const remaining = sentenceBuffer.trim();
          if (remaining.length > 0) {
            if (!streamSpeaker) {
              streamSpeaker = speakStreaming();
              setVoiceState('speaking');
              startedSpeaking = true;
            }
            streamSpeaker.addSentence(remaining);
          }

          // Wait for all audio to finish playing
          if (streamSpeaker) {
            await streamSpeaker.finish();
          }
          setVoiceState('idle');
        } catch (err) {
          console.error('Error:', err);
          setError('Something went wrong. Tap to try again.');
          setVoiceState('idle');
          setTimeout(() => setError(null), 4000);
        }
      };

      const handleMicClick = () => {
        if (voiceState === 'speaking') {
          cancelSpeak();
          setVoiceState('idle');
          return;
        }
        if (voiceState === 'processing') return;

        if (voiceState === 'listening') {
          stopRec();
          if (interimText.trim()) {
            sendToClaude(interimText.trim());
          } else {
            setVoiceState('idle');
          }
          return;
        }

        setVoiceState('listening');
        setInterimText('');
        setError(null);

        startRec(
          (interim) => setInterimText(interim),
          (final) => {
            setInterimText('');
            stopRec();
            if (final.trim()) sendToClaude(final.trim());
            else setVoiceState('idle');
          },
          (err) => {
            setError(err === 'not-allowed' ? 'Mic access denied. Check browser permissions.' : `Speech error: ${err}`);
            setVoiceState('idle');
            setTimeout(() => setError(null), 4000);
          }
        );
      };

      const handleTextSubmit = (e) => {
        e.preventDefault();
        if (!textInput.trim() || voiceState === 'processing' || voiceState === 'speaking') return;
        cancelSpeak();
        sendToClaude(textInput.trim());
        setTextInput('');
      };

      const handleNewChat = () => {
        cancelSpeak();
        setProfile(null);
        profileRef.current = null;
        setMessages([]);
        setVoiceState('idle');
        setInterimText('');
        setTextInput('');
        setError(null);
        setStarted(false);
      };

      // ── Onboarding Quiz ──
      if (!started) {
        return React.createElement(ProfileQuiz, { onComplete: handleQuizComplete });
      }

      const statusLabel = {
        idle: sttSupported ? 'Tap to speak' : 'Type below',
        listening: 'Listening...',
        processing: 'Thinking...',
        speaking: 'Tap to stop',
      }[voiceState];

      // ── Chat UI ──
      return React.createElement('div', { className: 'app-shell' },
        // Top bar
        React.createElement('header', { className: 'app-header' },
          React.createElement('div', { className: 'header-left' },
            React.createElement('div', { className: 'header-icon' },
              React.createElement('img', { src: '/images/icon-avatar.svg', alt: '', width: 22, height: 22, className: 'doodle-icon' })
            ),
            React.createElement('span', { className: 'header-title' }, 'Feel Understood'),
          ),
          React.createElement('button', {
            className: 'new-chat-btn',
            onClick: handleNewChat,
            title: 'Start over'
          }, 'Start Over')
        ),

        // Messages
        React.createElement('main', { className: 'chat-area' },
          messages.map((m, i) =>
            React.createElement(MessageBubble, { key: i, role: m.role, content: m.content })
          ),
          voiceState === 'processing' && React.createElement(TypingIndicator, {}),
          interimText && React.createElement('div', { className: 'msg-row user' },
            React.createElement('div', { className: 'bubble interim-bubble' }, interimText)
          ),
          React.createElement('div', { ref: chatEndRef })
        ),

        // Error
        error && React.createElement('div', { className: 'error-bar' }, error),

        // Controls
        React.createElement('footer', { className: 'controls' },
          // Mic area
          React.createElement('div', { className: 'mic-area' },
            voiceState === 'listening' && React.createElement(WaveVisualizer, {}),
            React.createElement('button', {
              className: `mic-btn ${voiceState}`,
              onClick: handleMicClick,
              'aria-label': statusLabel,
            },
              voiceState === 'speaking'
                ? React.createElement('svg', { width: 28, height: 28, viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: 2.5, strokeLinecap: 'round', strokeLinejoin: 'round' },
                    React.createElement('rect', { x: 6, y: 6, width: 12, height: 12, rx: 2 })
                  )
                : React.createElement('svg', { width: 28, height: 28, viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: 2.5, strokeLinecap: 'round', strokeLinejoin: 'round' },
                    React.createElement('rect', { x: 9, y: 2, width: 6, height: 12, rx: 3 }),
                    React.createElement('path', { d: 'M5 11a7 7 0 0 0 14 0' }),
                    React.createElement('line', { x1: 12, y1: 18, x2: 12, y2: 22 }),
                    React.createElement('line', { x1: 9, y1: 22, x2: 15, y2: 22 })
                  )
            ),
            React.createElement('span', { className: 'mic-label' }, statusLabel),
          ),

          // Text input
          React.createElement('form', { className: 'text-form', onSubmit: handleTextSubmit },
            React.createElement('input', {
              ref: inputRef,
              type: 'text',
              value: textInput,
              onChange: (e) => setTextInput(e.target.value),
              placeholder: 'Or type here...',
              disabled: voiceState === 'processing' || voiceState === 'speaking',
              className: 'text-input',
            }),
            React.createElement('button', {
              type: 'submit',
              disabled: !textInput.trim() || voiceState === 'processing' || voiceState === 'speaking',
              className: `send-btn ${textInput.trim() ? 'active' : ''}`,
            },
              React.createElement('svg', { width: 20, height: 20, viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: 2.5, strokeLinecap: 'round', strokeLinejoin: 'round' },
                React.createElement('line', { x1: 5, y1: 12, x2: 19, y2: 12 }),
                React.createElement('polyline', { points: '12 5 19 12 12 19' })
              )
            )
          ),

          !sttSupported && React.createElement('p', { className: 'browser-warn' },
            'Voice requires Chrome or Edge. Type below instead.'
          )
        )
      );
    };

    // ── Register Service Worker ──
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
