  <div id="root"></div>
  <script type="text/babel">

    const SYSTEM_PROMPT = `You are the Dialogue Coach — a warm, knowledgeable, and encouraging conversation coach and practice buddy. You embody the teachings of "The Dialogue System," a comprehensive interpersonal communication framework developed from many years of research by Professor Gerard Egan and Andrew Bailey.

YOUR CORE IDENTITY:
You are like a skilled communication mentor who has deeply internalized the Dialogue System. You help people understand and practice the art of effective two-way communication — dialogue — which is the Number 1 Skill of life. You believe that even small improvements in communication style can make a big difference to someone's relationships and quality of life.

THE DIALOGUE SYSTEM — YOUR SOURCE OF TRUTH:

1. TRUE DIALOGUE has four characteristics:
   - Turn-taking: Both people share the airtime
   - Connecting: What each person says connects with what the other said
   - Mutual influence: Give-and-take, open to being influenced
   - Co-creating: Together creating something new — the outcome emerges with uncertainty

2. THREE ROLES we switch between in every conversation:
   - EXPLAINER: When you have something to share (story, message, point of view, or case). Goal: be understood.
   - UNDERSTANDER: When your job is to understand the other person. Active, not passive.
   - CONVERSATION MANAGER: Looking after the well-being of the conversation itself.

3. EXPLAINER SKILLS:
   - Engage attention — don't assume the other person is tuned in
   - Headline and underline — name your topic clearly upfront
   - Provide context — set the scene with background
   - Fill in the picture using the right framework:
     * SAME for stories (Situation, Actions, Mental states, Experiences)
     * MRI for messages (Message, Reasons, Implications)
     * PRE for points of view (Point, Reasons, Evidence/Examples)
     * CRITIC for making a case (Case/Credibility, Reasons, Interests of stakeholders, Time to digest, your Interests, Compromise)
   - Bring things to life — be concrete and specific, use examples
   - Personalise appropriately — share yourself to build relationships
   - Welcome questions — treat them as opportunities, not interruptions
   - Check for understanding — provide summaries, look for clues

4. UNDERSTANDER SKILLS:
   - Visibly tune in — body language must show you are present
   - Listen actively with an open mind — avoid judgmental, filtered, stereotype-based, resistive, or interpretive listening
   - Identify highlights — the main points the Explainer is trying to get across
   - Feed back highlights — share your understanding in your own words (most important and underused skill)
   - Work to get the full picture — encourage flow, probe for clarity with open questions
   - Respond constructively — avoid instant advice, being judgmental, dismissing concerns, or hijacking
   - Summarise for mutual understanding

5. CONVERSATION MANAGER SKILLS:
   - Prepare for important conversations (purpose, main points, right frame of mind)
   - Share and negotiate purpose — avoid talking at cross-purposes
   - Manage flow and turn-taking — invite others in
   - Build on mutual respect — straight-across, not up-down conversations
   - Honour conversational rights — respect timing, boundaries, and the right to decline
   - Make emotions serve conversations — monitor emotional temperature, respond rather than react, count to ten
   - Read social undercurrents — use social intelligence, competence, and courage
   - Collaborate don't compete — aim for win-win, not win-lose
   - Repair conversations when your behavior is at fault — catch mistakes and fix them
   - Coach others to play better — help less-skilled partners engage in dialogue

6. THE SLIPPERY SLOPE (how misunderstandings escalate):
   Experience an incident → Give it your own spin → Make assumptions → Draw unwarranted conclusions → Act on the mess you've created

7. KEY PRINCIPLES:
   - Misunderstanding is the norm, not the exception
   - Take personal responsibility for the quality of your conversations
   - "Boredom is a self-indictment" — say "I'm letting myself be bored" not "I'm bored"
   - You always have a choice in how you respond
   - Better communication is for a better life

HOW YOU INTERACT:

Mode 1 — TEACHING: When the user wants to learn about communication concepts, explain them warmly using vivid examples from everyday life (like the book does). Reference the specific frameworks (SAME, MRI, PRE, CRITIC) and the three roles naturally.

Mode 2 — COACHING: When the user describes a real conversation challenge, help them analyze it through the lens of the three roles and relevant skills. Ask which role they were in. Help them see what went well and what could improve. Be specific and actionable.

Mode 3 — PRACTICE: When the user wants to practice, role-play conversations with them. You can play the "other person" in a scenario they describe. Afterward, give constructive feedback on their Explainer, Understander, or Conversation Manager skills. Suggest specific improvements.

Mode 4 — REFLECTION: Help users discover their own communication style — their "theme and variations." Ask about patterns across different relationships and settings. Help them identify strengths and growth areas.

VOICE & STYLE GUIDELINES:
- Keep responses conversational and concise — 2 to 4 sentences max since they will be spoken aloud.
- Be warm, encouraging, and practical — like a wise friend, not a lecturer.
- Use natural spoken language. Avoid bullet points, markdown, asterisks, or long paragraphs.
- Reference the system's concepts naturally (e.g., "That sounds like you were in the Understander role" or "A headline might help here").
- Ask one thoughtful follow-up question to keep the conversation going.
- When giving feedback, balance what went well with what could improve.
- Use the Dialogue System's own principles in YOUR conversation — model good dialogue by feeding back highlights, checking understanding, and showing genuine interest.
- Never be preachy or condescending. The book itself says "you don't always have to be nice" — be real and direct when needed, but always respectful.`;

    const GREETING = "Hey! I'm your Dialogue Coach. Want to learn a communication skill, get help with a tricky conversation, or jump into a role-play? What's on your mind?";

    // ── Speech Recognition Hook ──
    const useSpeechRecognition = () => {
      const recognitionRef = React.useRef(null);
      const [supported, setSupported] = React.useState(true);

      React.useEffect(() => {
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SR) { setSupported(false); return; }
        const r = new SR();
        r.continuous = false;
        r.interimResults = true;
        r.lang = 'en-US';
        recognitionRef.current = r;
        return () => { try { r.abort(); } catch(e) {} };
      }, []);

      const start = (onInterim, onFinal, onError) => {
        const r = recognitionRef.current;
        if (!r) return;
        r.onresult = (e) => {
          let interim = '', final = '';
          for (let i = e.resultIndex; i < e.results.length; i++) {
            const t = e.results[i][0].transcript;
            if (e.results[i].isFinal) final += t;
            else interim += t;
          }
          if (interim) onInterim(interim);
          if (final) onFinal(final);
        };
        r.onerror = (e) => {
          if (e.error === 'no-speech' || e.error === 'aborted') return;
          onError(e.error);
        };
        r.onend = () => {};
        try { r.start(); } catch(e) {}
      };

      const stop = () => {
        try { recognitionRef.current?.stop(); } catch(e) {}
      };

      return { start, stop, supported };
    };

    // ── TTS Audio Queue (OpenAI TTS via Nova) ──
    // Fetches TTS for a sentence and returns a playable blob URL
    const fetchTTS = async (text) => {
      const response = await fetch('/api/tts', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ input: text, voice: 'nova' }),
      });
      if (!response.ok) throw new Error('TTS failed');
      const blob = await response.blob();
      return URL.createObjectURL(blob);
    };

    // Plays a single audio URL, returns a promise
    const playAudioUrl = (url, audioRef) => {
      return new Promise((resolve) => {
        const audio = new Audio(url);
        audioRef.current = audio;
        audio.onended = () => { URL.revokeObjectURL(url); audioRef.current = null; resolve(); };
        audio.onerror = () => { URL.revokeObjectURL(url); audioRef.current = null; resolve(); };
        audio.play().catch(() => resolve());
      });
    };

    // Splits text into sentences for chunked TTS
    const splitSentences = (text) => {
      const parts = text.match(/[^.!?]+[.!?]+[\s]*/g);
      if (!parts) return [text];
      // Recombine very short fragments with previous sentence
      const result = [];
      for (const p of parts) {
        if (result.length > 0 && result[result.length - 1].length < 20) {
          result[result.length - 1] += p;
        } else {
          result.push(p);
        }
      }
      return result;
    };

    const useSpeechSynthesis = () => {
      const audioRef = React.useRef(null);
      const cancelledRef = React.useRef(false);

      const speak = async (text) => {
        cancelledRef.current = false;
        try {
          const sentences = splitSentences(text);
          // Fire all TTS requests in parallel immediately
          const ttsPromises = sentences.map(s => fetchTTS(s.trim()));
          // Play each in order as they resolve
          for (let i = 0; i < sentences.length; i++) {
            if (cancelledRef.current) return;
            const url = await ttsPromises[i];
            if (cancelledRef.current) { URL.revokeObjectURL(url); return; }
            await playAudioUrl(url, audioRef);
          }
        } catch (err) {
          console.error('TTS error:', err);
          if (!cancelledRef.current) {
            return new Promise((resolve) => {
              const u = new SpeechSynthesisUtterance(text);
              u.rate = 1.0;
              u.onend = resolve;
              u.onerror = resolve;
              speechSynthesis.speak(u);
            });
          }
        }
      };

      // Streaming speak: accepts sentences one at a time, overlaps fetch + playback
      const speakStreaming = () => {
        cancelledRef.current = false;
        const queue = []; // { promise: Promise<url>, index }
        let playIndex = 0;
        let playing = false;
        let resolveFinished;
        let doneAdding = false;
        const finished = new Promise(r => { resolveFinished = r; });

        const tryPlay = async () => {
          if (playing) return;
          playing = true;
          while (playIndex < queue.length) {
            if (cancelledRef.current) break;
            try {
              const url = await queue[playIndex];
              if (cancelledRef.current) { URL.revokeObjectURL(url); break; }
              await playAudioUrl(url, audioRef);
            } catch (e) { /* skip failed chunk */ }
            playIndex++;
          }
          playing = false;
          if (doneAdding && playIndex >= queue.length) resolveFinished();
        };

        const addSentence = (sentence) => {
          queue.push(fetchTTS(sentence.trim()));
          tryPlay();
        };

        const finish = () => {
          doneAdding = true;
          if (playIndex >= queue.length) resolveFinished();
          else tryPlay();
          return finished;
        };

        return { addSentence, finish };
      };

      const cancel = () => {
        cancelledRef.current = true;
        if (audioRef.current) {
          audioRef.current.pause();
          audioRef.current.currentTime = 0;
          audioRef.current = null;
        }
        speechSynthesis.cancel();
      };

      return { speak, speakStreaming, cancel };
    };

    // ── Onboarding Screen ──
    const OnboardingScreen = ({ onStart }) => {
      return React.createElement('div', { className: 'onboarding' },
        React.createElement('div', { className: 'onboarding-content' },
          React.createElement('div', { className: 'onboarding-logo' },
            React.createElement('img', { src: '/images/logo.svg', alt: 'Feel Understood', height: 32 })
          ),
          React.createElement('h1', { className: 'onboarding-title' }, 'The Conversation Coach'),
          React.createElement('p', { className: 'onboarding-sub' }, 'Practice better conversations with AI'),
          React.createElement('div', { className: 'onboarding-features' },
            React.createElement('div', { className: 'onboarding-feature' },
              React.createElement('span', { className: 'feature-icon' },
                React.createElement('img', { src: '/images/icon-learn.svg', alt: '', width: 28, height: 28, className: 'doodle-icon' })
              ),
              React.createElement('div', {},
                React.createElement('strong', {}, 'Learn'),
                React.createElement('span', {}, 'Communication skills & frameworks'),
              )
            ),
            React.createElement('div', { className: 'onboarding-feature' },
              React.createElement('span', { className: 'feature-icon' },
                React.createElement('img', { src: '/images/icon-coach.svg', alt: '', width: 28, height: 28, className: 'doodle-icon' })
              ),
              React.createElement('div', {},
                React.createElement('strong', {}, 'Coach'),
                React.createElement('span', {}, 'Get help with real challenges'),
              )
            ),
            React.createElement('div', { className: 'onboarding-feature' },
              React.createElement('span', { className: 'feature-icon' },
                React.createElement('img', { src: '/images/icon-practice.svg', alt: '', width: 28, height: 28, className: 'doodle-icon' })
              ),
              React.createElement('div', {},
                React.createElement('strong', {}, 'Practice'),
                React.createElement('span', {}, 'Role-play tricky conversations'),
              )
            ),
          ),
          React.createElement('button', {
            className: 'start-btn',
            onClick: onStart
          }, 'Start Talking'),
          React.createElement('p', { className: 'onboarding-note' }, 'Works best in Chrome. Uses your microphone for voice chat.'),
        )
      );
    };

    // ── Typing Indicator ──
    const TypingIndicator = () => {
      return React.createElement('div', { className: 'msg-row assistant' },
        React.createElement('div', { className: 'avatar' },
              React.createElement('img', { src: '/images/icon-avatar.svg', alt: '', width: 20, height: 20, className: 'doodle-icon' })
            ),
        React.createElement('div', { className: 'bubble assistant-bubble typing-bubble' },
          ...[0, 1, 2].map(i =>
            React.createElement('div', {
              key: i,
              className: 'typing-dot',
              style: { animationDelay: `${i * 0.2}s` }
            })
          )
        )
      );
    };

    // ── Message Bubble ──
    const MessageBubble = ({ role, content }) => {
      const isUser = role === 'user';
      return React.createElement('div', { className: `msg-row ${role}` },
        !isUser && React.createElement('div', { className: 'avatar' },
              React.createElement('img', { src: '/images/icon-avatar.svg', alt: '', width: 20, height: 20, className: 'doodle-icon' })
            ),
        React.createElement('div', {
          className: `bubble ${isUser ? 'user-bubble' : 'assistant-bubble'}`
        }, content)
      );
    };

    // ── Wave Visualizer ──
    const WaveVisualizer = () => {
      return React.createElement('div', { className: 'wave-viz' },
        ...[0,1,2,3,4,5,6].map(i =>
          React.createElement('div', {
            key: i,
            className: 'wave-bar',
            style: { animationDelay: `${i * 0.1}s` }
          })
        )
      );
    };

    // ── Main App ──
    const App = () => {
      const [started, setStarted] = React.useState(false);
      const [messages, setMessages] = React.useState([
        { role: 'assistant', content: GREETING }
      ]);
      const [voiceState, setVoiceState] = React.useState('idle');
      const [interimText, setInterimText] = React.useState('');
      const [textInput, setTextInput] = React.useState('');
      const [error, setError] = React.useState(null);
      const chatEndRef = React.useRef(null);
      const messagesRef = React.useRef(messages);
      const inputRef = React.useRef(null);
      const { start: startRec, stop: stopRec, supported: sttSupported } = useSpeechRecognition();
      const { speak, speakStreaming, cancel: cancelSpeak } = useSpeechSynthesis();

      React.useEffect(() => { messagesRef.current = messages; }, [messages]);

      React.useEffect(() => {
        chatEndRef.current?.scrollIntoView({ behavior: 'smooth' });
      }, [messages, voiceState, interimText]);

      const handleStart = () => {
        setStarted(true);
        setTimeout(() => {
          setVoiceState('speaking');
          speak(GREETING).then(() => setVoiceState('idle'));
        }, 400);
      };

      const sendToClaude = async (userText) => {
        const updated = [...messagesRef.current, { role: 'user', content: userText }];
        setMessages(updated);
        setVoiceState('processing');
        setInterimText('');

        try {
          const response = await fetch('/api/chat-stream', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              system: SYSTEM_PROMPT,
              max_tokens: 500,
              messages: updated.map(m => ({ role: m.role, content: m.content })),
            }),
          });

          if (!response.ok) throw new Error('Stream request failed');

          const reader = response.body.getReader();
          const decoder = new TextDecoder();
          let fullText = '';
          let sentenceBuffer = '';
          let streamSpeaker = null;
          let startedSpeaking = false;

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            const chunk = decoder.decode(value, { stream: true });
            const lines = chunk.split('\n');

            for (const line of lines) {
              if (!line.startsWith('data: ')) continue;
              const data = line.slice(6).trim();
              if (data === '[DONE]') continue;

              try {
                const parsed = JSON.parse(data);
                if (parsed.text) {
                  fullText += parsed.text;
                  sentenceBuffer += parsed.text;

                  // Update message text as it streams in
                  setMessages([...updated, { role: 'assistant', content: fullText }]);

                  // Aggressively fire TTS on any natural break point
                  // Priority 1: sentence endings (.!?)
                  // Priority 2: clause breaks (,;:—–) if buffer > 40 chars
                  // Priority 3: any content if buffer > 80 chars (force split at word boundary)
                  let fireChunk = null;
                  const sentenceMatch = sentenceBuffer.match(/^([\s\S]*?[.!?])[\s]?/);
                  const clauseMatch = sentenceBuffer.length > 40 && sentenceBuffer.match(/^([\s\S]*?[,;:\u2014\u2013])[\s]?/);

                  if (sentenceMatch) {
                    fireChunk = sentenceMatch[1].trim();
                    sentenceBuffer = sentenceBuffer.slice(sentenceMatch[0].length);
                  } else if (clauseMatch) {
                    fireChunk = clauseMatch[1].trim();
                    sentenceBuffer = sentenceBuffer.slice(clauseMatch[0].length);
                  } else if (sentenceBuffer.length > 80) {
                    // Force split at last word boundary
                    const wordBreak = sentenceBuffer.lastIndexOf(' ', 80);
                    const splitAt = wordBreak > 20 ? wordBreak : 80;
                    fireChunk = sentenceBuffer.slice(0, splitAt).trim();
                    sentenceBuffer = sentenceBuffer.slice(splitAt);
                  }

                  if (fireChunk && fireChunk.length > 0) {
                    if (!streamSpeaker) {
                      streamSpeaker = speakStreaming();
                      setVoiceState('speaking');
                      startedSpeaking = true;
                    }
                    streamSpeaker.addSentence(fireChunk);
                  }
                }
              } catch (e) { /* skip */ }
            }
          }

          // Handle any remaining text that didn't end with punctuation
          const remaining = sentenceBuffer.trim();
          if (remaining.length > 0) {
            if (!streamSpeaker) {
              streamSpeaker = speakStreaming();
              setVoiceState('speaking');
              startedSpeaking = true;
            }
            streamSpeaker.addSentence(remaining);
          }

          // Wait for all audio to finish playing
          if (streamSpeaker) {
            await streamSpeaker.finish();
          }
          setVoiceState('idle');
        } catch (err) {
          console.error('Error:', err);
          setError('Something went wrong. Tap to try again.');
          setVoiceState('idle');
          setTimeout(() => setError(null), 4000);
        }
      };

      const handleMicClick = () => {
        if (voiceState === 'speaking') {
          cancelSpeak();
          setVoiceState('idle');
          return;
        }
        if (voiceState === 'processing') return;

        if (voiceState === 'listening') {
          stopRec();
          if (interimText.trim()) {
            sendToClaude(interimText.trim());
          } else {
            setVoiceState('idle');
          }
          return;
        }

        setVoiceState('listening');
        setInterimText('');
        setError(null);

        startRec(
          (interim) => setInterimText(interim),
          (final) => {
            setInterimText('');
            stopRec();
            if (final.trim()) sendToClaude(final.trim());
            else setVoiceState('idle');
          },
          (err) => {
            setError(err === 'not-allowed' ? 'Mic access denied. Check browser permissions.' : `Speech error: ${err}`);
            setVoiceState('idle');
            setTimeout(() => setError(null), 4000);
          }
        );
      };

      const handleTextSubmit = (e) => {
        e.preventDefault();
        if (!textInput.trim() || voiceState === 'processing' || voiceState === 'speaking') return;
        cancelSpeak();
        sendToClaude(textInput.trim());
        setTextInput('');
      };

      const handleNewChat = () => {
        cancelSpeak();
        setMessages([{ role: 'assistant', content: GREETING }]);
        setVoiceState('idle');
        setInterimText('');
        setTextInput('');
        setError(null);
      };

      // ── Onboarding ──
      if (!started) {
        return React.createElement(OnboardingScreen, { onStart: handleStart });
      }

      const statusLabel = {
        idle: sttSupported ? 'Tap to speak' : 'Type below',
        listening: 'Listening...',
        processing: 'Thinking...',
        speaking: 'Tap to stop',
      }[voiceState];

      // ── Chat UI ──
      return React.createElement('div', { className: 'app-shell' },
        // Top bar
        React.createElement('header', { className: 'app-header' },
          React.createElement('div', { className: 'header-left' },
            React.createElement('div', { className: 'header-icon' },
              React.createElement('img', { src: '/images/icon-avatar.svg', alt: '', width: 22, height: 22, className: 'doodle-icon' })
            ),
            React.createElement('span', { className: 'header-title' }, 'Conversation Coach'),
          ),
          React.createElement('button', {
            className: 'new-chat-btn',
            onClick: handleNewChat,
            title: 'New conversation'
          }, 'New Chat')
        ),

        // Messages
        React.createElement('main', { className: 'chat-area' },
          messages.map((m, i) =>
            React.createElement(MessageBubble, { key: i, role: m.role, content: m.content })
          ),
          voiceState === 'processing' && React.createElement(TypingIndicator, {}),
          interimText && React.createElement('div', { className: 'msg-row user' },
            React.createElement('div', { className: 'bubble interim-bubble' }, interimText)
          ),
          React.createElement('div', { ref: chatEndRef })
        ),

        // Error
        error && React.createElement('div', { className: 'error-bar' }, error),

        // Controls
        React.createElement('footer', { className: 'controls' },
          // Mic area
          React.createElement('div', { className: 'mic-area' },
            voiceState === 'listening' && React.createElement(WaveVisualizer, {}),
            React.createElement('button', {
              className: `mic-btn ${voiceState}`,
              onClick: handleMicClick,
              'aria-label': statusLabel,
            },
              voiceState === 'speaking'
                ? React.createElement('svg', { width: 28, height: 28, viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: 2.5, strokeLinecap: 'round', strokeLinejoin: 'round' },
                    React.createElement('rect', { x: 6, y: 6, width: 12, height: 12, rx: 2 })
                  )
                : React.createElement('svg', { width: 28, height: 28, viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: 2.5, strokeLinecap: 'round', strokeLinejoin: 'round' },
                    React.createElement('rect', { x: 9, y: 2, width: 6, height: 12, rx: 3 }),
                    React.createElement('path', { d: 'M5 11a7 7 0 0 0 14 0' }),
                    React.createElement('line', { x1: 12, y1: 18, x2: 12, y2: 22 }),
                    React.createElement('line', { x1: 9, y1: 22, x2: 15, y2: 22 })
                  )
            ),
            React.createElement('span', { className: 'mic-label' }, statusLabel),
          ),

          // Text input
          React.createElement('form', { className: 'text-form', onSubmit: handleTextSubmit },
            React.createElement('input', {
              ref: inputRef,
              type: 'text',
              value: textInput,
              onChange: (e) => setTextInput(e.target.value),
              placeholder: 'Or type here...',
              disabled: voiceState === 'processing' || voiceState === 'speaking',
              className: 'text-input',
            }),
            React.createElement('button', {
              type: 'submit',
              disabled: !textInput.trim() || voiceState === 'processing' || voiceState === 'speaking',
              className: `send-btn ${textInput.trim() ? 'active' : ''}`,
            },
              React.createElement('svg', { width: 20, height: 20, viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: 2.5, strokeLinecap: 'round', strokeLinejoin: 'round' },
                React.createElement('line', { x1: 5, y1: 12, x2: 19, y2: 12 }),
                React.createElement('polyline', { points: '12 5 19 12 12 19' })
              )
            )
          ),

          !sttSupported && React.createElement('p', { className: 'browser-warn' },
            'Voice requires Chrome or Edge. Type below instead.'
          )
        )
      );
    };

    // ── Register Service Worker ──
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
